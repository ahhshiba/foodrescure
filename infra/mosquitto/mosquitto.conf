# Glitch Salvage MQTT broker config
# The external Edge (Raspberry Pi) connects here over Tailscale using the
# same MQTT_USER / MQTT_PASSWORD credentials.

listener 1883 0.0.0.0
protocol mqtt

# Anonymous access disabled — Edge + backend authenticate with username/password.
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

# Log to stdout so `docker compose logs mosquitto` shows activity.
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
