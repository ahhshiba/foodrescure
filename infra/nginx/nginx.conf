worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Map the Upgrade header so WebSocket connections survive the proxy hop.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream api_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        # ---- REST API ----
        location /api/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://api_backend;
        }

        # ---- WebSocket (/ws) ----
        location /ws {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- Frontend (served by nginx in later milestones) ----
        # In M5/M6 the built game/dashboard bundles get mounted here.
        location / {
            return 200 'Glitch Salvage edge proxy is up. Frontend lands in M5/M6.\n';
            add_header Content-Type text/plain;
        }
    }
}
