# Glitch Salvage — local stack (Docker Desktop / WSL2 backend on Windows 11)
# Bring up:   docker compose up
# Migrations: docker compose run --rm api alembic upgrade head

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
    ports:
      - "${MQTT_HOST_PORT:-1883}:1883"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/entrypoint.sh:/entrypoint.sh:ro
      - mqtt_data:/mosquitto/data
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      # A successful authenticated publish proves the broker is up + creds work.
      test:
        ["CMD-SHELL",
         "mosquitto_pub -h localhost -u $$MQTT_USER -P $$MQTT_PASSWORD -t health/check -m ok || exit 1"]
      interval: 10s
      timeout: 6s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  api:
    build: ./server
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-true}
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
      - "5678:5678"   # debugpy attach
    volumes:
      - ./server:/app
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http --url=stunt-custodian-seducing.ngrok-free.dev nginx:80
    environment:
      - NGROK_AUTHTOKEN=3EOq3xyirMJEdTlM6kkJKhmrd1r_7Ai1DfLAxsHbajWzbEUW7
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  pg_data:
  mqtt_data:
